name: Deploy Flask App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H  deploy@offering-temperature-plug-stand.trycloudflare.com >> ~/.ssh/known_hosts

      - name: Deploy to WSL server
        run: |
          ssh akash@ deploy@offering-temperature-plug-stand.trycloudflare.com "bash ~/server/flask-demo/deploy.sh"